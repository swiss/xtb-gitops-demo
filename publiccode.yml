description:
  en:
    localisedName: gitops.trustbroker.swiss
    shortDescription: GitOps demo for trustbroker.swiss OIDC and SAML federator
    longDescription: trustbroker.swiss provides brokerage functionality between
      Relying Parties (Applications, other IAM Systems or Policy Enforcement
      Points) and Identity Providers (IdP) and Trusted Attribute Stores. It
      enables Identity Providers and Relying Parties to exchange information and
      to trust without having any clue about each other.
      gitops.trustbroker.swiss contains a GitOps demo configuration for https://github.com/swiss/trustbroker.swiss
    documentation: https://github.com/swiss/doc.trustbroker.swiss
    features:
      - OIDC federation
      - SAML federation
      - IDP selection
